services:
  postgres:
    image: postgres:17-alpine
    container_name: quizzty-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: quizzty
      POSTGRES_PASSWORD: quizzty
      POSTGRES_DB: quizzty
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quizzty-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
